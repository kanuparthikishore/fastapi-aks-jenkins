apiVersion: apps/v1

kind: Deployment

metadata:

  name: fastapi-manual

spec:

  replicas: 2

  selector:

    matchLabels:

      app: fastapi-manual

  template:

    metadata:

      labels:

        app: fastapi-manual

    spec:

      containers:

        - name: fastapi-manual

          image: ghcr.io/kanuparthikishore/fastapi-manual:latest

          ports:

            - containerPort: 8000

---

apiVersion: v1

kind: Service

metadata:

  name: fastapi-manual-svc

spec:

  type: NodePort

  selector:

    app: fastapi-manual

  ports:

    - port: 80

      targetPort: 8000
