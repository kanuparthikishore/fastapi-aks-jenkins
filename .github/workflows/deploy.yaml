name: Build and Deploy to Manual K8s

on:



    
  push:

    branches: [ main ]

jobs:

  build-and-deploy:

    runs-on: self-hosted   # this targets the runner on cp1

    steps:

      - name: Checkout code

        uses: actions/checkout@v4

      - name: Log in to GHCR

        uses: docker/login-action@v3

        with:

          registry: ghcr.io

          username: ${{ github.actor }}

          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image

        run: |

          IMAGE=ghcr.io/kanuparthikishore/fastapi-manual:${{ github.sha }}

          docker build -t $IMAGE -t ghcr.io/kanuparthikishore/fastapi-manual:latest .

          docker push $IMAGE

          docker push ghcr.io/kanuparthikishore/fastapi-manual:latest

      - name: Deploy to cluster

        run: |

          kubectl apply -f k8s/deployment.yaml

          kubectl set image deployment/fastapi-manual fastapi-manual=ghcr.io/kanuparthikishore/fastapi-manual:${{ github.sha }}

          kubectl rollout status deployment/fastapi-manual

You'll need Docker installed on cp1 for the build step:

sudo apt-get install -y docker.io

sudo usermod -aG docker $USER

newgrp docker
