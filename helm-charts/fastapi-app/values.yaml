replicaCount: 2

image:
  repository: ghcr.io/YOUR_GITHUB_USERNAME/fastapi-app
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: nginx
  host: fastapi.local
  path: /

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpuThreshold: 60

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

readinessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 5

livenessProbe:
  path: /health
  initialDelaySeconds: 15
  periodSeconds: 10
